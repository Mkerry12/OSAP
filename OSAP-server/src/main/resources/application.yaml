server:
  port: 8081
spring:
  application:
    name: OSAP-server
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/osap?useSSL=false&serverTimezone=UTC
    username: root
    password: 123456
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
  data:
    redis:
      host: 192.168.44.128
      port: 6379
      password: mokaihua1212
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 1
          time-between-eviction-runs: 10s
      database: 1
logging:
  level:
    com:
      mqq:
        mapper: debug
        service: info
        controller: info
mybatis:
  #mapper配置文件
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.mqq.entity
  type-handlers-package: com.mqq.config
  configuration:
    #开启驼峰命名
    map-underscore-to-camel-case: true

mqq:
  alioss:
    access-key-id: ${OSS_ACCESS_KEY_ID}
    endpoint: oss-cn-beijing.aliyuncs.com
    bucket-name: osap-moseery
    access-key-secret: ${OSS_ACCESS_KEY_SECRET}

